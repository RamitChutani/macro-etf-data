<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Returns Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#151d2e;--bg-card-hover:#1a2540;--border:#1e293b;--border-light:#2a3a52;--text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;--accent-green:#22c55e;--accent-red:#ef4444;--accent-blue:#3b82f6;--accent-cyan:#06b6d4;--region-americas:#f59e0b;--region-europe:#3b82f6;--region-asia:#10b981;--region-mea:#f43f5e;--region-us:#8b5cf6;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-body);line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg-primary)}::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
.header{position:sticky;top:0;z-index:100;background:rgba(10,14,23,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-family:var(--font-mono);font-size:20px;font-weight:700;background:linear-gradient(135deg,#3b82f6,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.header-subtitle{font-size:12px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:0.5px}
.header-right{display:flex;align-items:center;gap:12px}
.date-badge{font-family:var(--font-mono);font-size:11px;color:var(--accent-cyan);background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);padding:5px 12px;border-radius:20px}
.currency-toggle{display:flex;background:var(--bg-secondary);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.currency-btn{font-family:var(--font-mono);font-size:12px;font-weight:600;padding:6px 14px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);transition:all 0.2s}
.currency-btn.active{background:var(--accent-blue);color:#fff}
.nav-tabs{display:flex;gap:2px;padding:0 32px;background:var(--bg-primary);border-bottom:1px solid var(--border)}
.nav-tab{font-size:13px;font-weight:600;padding:14px 24px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.2s;letter-spacing:0.3px}
.nav-tab:hover{color:var(--text-secondary)}.nav-tab.active{color:var(--text-primary);border-bottom-color:var(--accent-blue)}
.nav-tab .tab-count{font-family:var(--font-mono);font-size:10px;background:var(--bg-card);padding:2px 6px;border-radius:10px;margin-left:6px;color:var(--text-muted)}
.nav-tab.active .tab-count{background:rgba(59,130,246,0.2);color:var(--accent-blue)}
.main{padding:24px 32px 60px;max-width:1600px;margin:0 auto}
.panel{display:none;animation:fadeIn 0.3s ease}.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.controls-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.period-toggle{display:flex;background:var(--bg-card);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.period-btn{font-family:var(--font-mono);font-size:12px;font-weight:500;padding:7px 16px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);transition:all 0.2s}
.period-btn:hover{color:var(--text-secondary)}.period-btn.active{background:var(--accent-blue);color:#fff}
.filter-pill{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s}
.filter-pill:hover{border-color:var(--text-muted);color:var(--text-secondary)}
.filter-pill.active{border-color:var(--accent-blue);color:var(--accent-blue);background:rgba(59,130,246,0.08)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:all 0.2s}
.stat-card:hover{border-color:var(--border-light)}
.stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:6px}
.stat-value{font-family:var(--font-mono);font-size:22px;font-weight:700}
.stat-detail{font-size:11px;color:var(--text-muted);margin-top:4px}
.stat-positive{color:var(--accent-green)}.stat-negative{color:var(--accent-red)}
.benchmarks-bar{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.bench-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;min-width:130px;transition:all 0.2s}
.bench-chip:hover{border-color:var(--border-light)}
.bench-name{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.bench-ticker{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-bottom:6px}
.bench-return{font-family:var(--font-mono);font-size:16px;font-weight:700}
.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;margin-bottom:24px}
.heat-cell{position:relative;border-radius:var(--radius);padding:14px 14px 12px;cursor:pointer;border:1px solid transparent;transition:all 0.25s ease;overflow:hidden}
.heat-cell:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.1);z-index:2}
.heat-cell .region-dot{width:6px;height:6px;border-radius:50%;position:absolute;top:10px;right:10px}
.heat-cell .cell-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.heat-cell .cell-ticker{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:8px}
.heat-cell .cell-return{font-family:var(--font-mono);font-size:20px;font-weight:700}
.heat-cell .cell-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.ranking-table{width:100%;border-collapse:collapse;background:var(--bg-card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.ranking-table thead th{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;padding:12px 16px;text-align:left;background:var(--bg-secondary);border-bottom:1px solid var(--border);white-space:nowrap}
.ranking-table tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s}
.ranking-table tbody tr:hover{background:var(--bg-card-hover)}
.ranking-table tbody td{padding:10px 16px;font-size:13px;white-space:nowrap}
.col-rank{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:40px;text-align:center}
.col-name{font-weight:600}.col-ticker{font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}
.col-return{font-family:var(--font-mono);font-weight:600;font-size:13px}
.return-bar-container{height:6px;background:var(--bg-secondary);border-radius:3px;position:relative;width:140px}
.return-bar{height:100%;border-radius:3px;transition:width 0.5s ease}
.region-badge{font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.tooltip-overlay{display:none;position:fixed;z-index:200;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius);padding:18px 22px;box-shadow:0 12px 40px rgba(0,0,0,0.5);min-width:300px;pointer-events:none}
.tooltip-overlay.show{display:block}
.tooltip-name{font-size:15px;font-weight:700;margin-bottom:2px}
.tooltip-ticker{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-bottom:10px}
.tooltip-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px}
.tooltip-metric-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.tooltip-metric-value{font-family:var(--font-mono);font-size:15px;font-weight:700;margin-top:2px}
.view-toggle{display:flex;background:var(--bg-card);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.view-btn{font-size:12px;font-weight:600;padding:7px 14px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);transition:all 0.2s;display:flex;align-items:center;gap:5px}
.view-btn.active{background:var(--accent-blue);color:#fff}
.view-btn svg{width:14px;height:14px}
.footer{text-align:center;padding:24px 32px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);font-family:var(--font-mono)}
@media(max-width:768px){.header{padding:12px 16px;flex-wrap:wrap}.nav-tabs{padding:0 16px;overflow-x:auto}.main{padding:16px}.heatmap-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.stats-row{grid-template-columns:1fr 1fr}}
</style>
</head>

// STATE
let S={panel:'overview',period:{overview:'w1',countries:'w1',sectors:'w1',factors:'w1'},cur:'usd',regionFilter:'all',view:{countries:'heatmap',sectors:'heatmap',factors:'heatmap'}};

// UTILS
const RC={'Americas':'var(--region-americas)','Europe':'var(--region-europe)','Asia-Pacific':'var(--region-asia)','Middle East & Africa':'var(--region-mea)','US':'var(--region-us)'};
const RB={'Americas':'rgba(245,158,11,0.12)','Europe':'rgba(59,130,246,0.12)','Asia-Pacific':'rgba(16,185,129,0.12)','Middle East & Africa':'rgba(244,63,94,0.12)','US':'rgba(139,92,246,0.12)'};
function gr(d,p,c){return c==='cad'&&d[p+'_cad']!=null?d[p+'_cad']:d[p]}
function fp(v){if(v==null||isNaN(v))return'—';return(v>=0?'+':'')+(v*100).toFixed(1)+'%'}
function rc(v){return v>=0?'var(--accent-green)':'var(--accent-red)'}
function hc(v,m){let n=Math.min(Math.abs(v)/m,1),i=0.15+n*0.55;return v>=0?`rgba(34,197,94,${i})`:`rgba(239,68,68,${i})`}
function grc(r){return RC[r]||'var(--text-muted)'}
function grb(r){return RB[r]||'rgba(100,116,139,0.12)'}

// BENCHMARKS
function renderBench(id,p,c){
  document.getElementById(id).innerHTML=benchmarks.map(b=>{let r=gr(b,p,c);return`<div class="bench-chip"><div class="bench-name">${b.country}</div><div class="bench-ticker">${b.ticker}</div><div class="bench-return" style="color:${rc(r)}">${fp(r)}</div></div>`}).join('');
}

// HEATMAP
function renderHeat(id,data,p,c,nf,dot){
  let el=document.getElementById(id),rets=data.map(d=>gr(d,p,c)),mx=Math.max(...rets.map(Math.abs),0.001);
  let sorted=[...data].sort((a,b)=>gr(b,p,c)-gr(a,p,c));
  el.innerHTML=sorted.map(d=>{let r=gr(d,p,c),bg=hc(r,mx),clr=r>=0?'#fff':'rgba(255,200,200,1)',nm=d[nf]||d.name||d.country;
    return`<div class="heat-cell" style="background:${bg}" onmouseenter="showTip(event,${JSON.stringify(d).replace(/"/g,'&quot;')})" onmouseleave="hideTip()" onmousemove="moveTip(event)">
    ${dot?`<div class="region-dot" style="background:${grc(d.region)}"></div>`:''}<div class="cell-name">${nm}</div><div class="cell-ticker">${d.ticker}</div><div class="cell-return" style="color:${clr}">${fp(r)}</div><div class="cell-sub">${d.region}</div></div>`}).join('');
}

// TABLE
function renderTbl(id,data,p,c,nf){
  let sorted=[...data].sort((a,b)=>gr(b,p,c)-gr(a,p,c)),mx=Math.max(...sorted.map(d=>Math.abs(gr(d,p,c))),0.001);
  let h=`<table class="ranking-table"><thead><tr><th>#</th><th>Name</th><th>Ticker</th><th>Region</th><th>1D</th><th>1W</th><th>YTD</th><th>1Y</th><th>3Y</th><th>Bar</th></tr></thead><tbody>`;
  sorted.forEach((d,i)=>{let r=gr(d,p,c),nm=d[nf]||d.name||d.country,bw=(Math.abs(r)/mx*100).toFixed(1),bc=r>=0?'var(--accent-green)':'var(--accent-red)';
    h+=`<tr><td class="col-rank">${i+1}</td><td class="col-name">${nm}</td><td class="col-ticker">${d.ticker}</td><td><span class="region-badge" style="color:${grc(d.region)};background:${grb(d.region)}">${d.region}</span></td>
    <td class="col-return" style="color:${rc(gr(d,'d1',c))}">${fp(gr(d,'d1',c))}</td><td class="col-return" style="color:${rc(gr(d,'w1',c))}">${fp(gr(d,'w1',c))}</td><td class="col-return" style="color:${rc(gr(d,'ytd',c))}">${fp(gr(d,'ytd',c))}</td>
    <td class="col-return" style="color:${rc(gr(d,'y1',c))}">${fp(gr(d,'y1',c))}</td><td class="col-return" style="color:${rc(gr(d,'y3',c))}">${fp(gr(d,'y3',c))}</td>
    <td><div class="return-bar-container"><div class="return-bar" style="width:${bw}%;background:${bc}"></div></div></td></tr>`});
  h+='</tbody></table>';document.getElementById(id).innerHTML=h;
}

// MINI RANKING
function miniR(data,p,c,nf,sr){
  return data.map((d,i)=>{let r=gr(d,p,c),nm=d[nf]||d.name||d.country;
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--bg-card);margin-bottom:4px;border:1px solid var(--border);">
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:18px;text-align:center;">${i+1}</span>
    <span style="flex:1;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${nm}${sr?' <span style="font-size:10px;color:var(--text-muted);font-weight:400">('+d.region+')</span>':''}</span>
    <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:${rc(r)}">${fp(r)}</span></div>`}).join('');
}

// OVERVIEW
function renderOverview(){
  let p=S.period.overview,c=S.cur;
  let spy=gr(benchmarks.find(b=>b.ticker==='SPY US'),p,c),eafa=gr(benchmarks.find(b=>b.ticker==='EFA US'),p,c),em=gr(benchmarks.find(b=>b.ticker==='EEM US'),p,c);
  let bC=[...countries].sort((a,b)=>gr(b,p,c)-gr(a,p,c)),wC=[...countries].sort((a,b)=>gr(a,p,c)-gr(b,p,c));
  let bS=[...sectors].sort((a,b)=>gr(b,p,c)-gr(a,p,c)),wS=[...sectors].sort((a,b)=>gr(a,p,c)-gr(b,p,c));
  document.getElementById('overviewStats').innerHTML=
    `<div class="stat-card"><div class="stat-label">S&P 500</div><div class="stat-value ${spy>=0?'stat-positive':'stat-negative'}">${fp(spy)}</div><div class="stat-detail">SPY US</div></div>
    <div class="stat-card"><div class="stat-label">EAFE</div><div class="stat-value ${eafa>=0?'stat-positive':'stat-negative'}">${fp(eafa)}</div><div class="stat-detail">EFA US</div></div>
    <div class="stat-card"><div class="stat-label">Emerging Mkts</div><div class="stat-value ${em>=0?'stat-positive':'stat-negative'}">${fp(em)}</div><div class="stat-detail">EEM US</div></div>
    <div class="stat-card"><div class="stat-label">Best Country</div><div class="stat-value stat-positive">${fp(gr(bC[0],p,c))}</div><div class="stat-detail">${bC[0].country}</div></div>
    <div class="stat-card"><div class="stat-label">Worst Country</div><div class="stat-value stat-negative">${fp(gr(wC[0],p,c))}</div><div class="stat-detail">${wC[0].country}</div></div>
    <div class="stat-card"><div class="stat-label">Best Sector</div><div class="stat-value stat-positive">${fp(gr(bS[0],p,c))}</div><div class="stat-detail">${bS[0].name}</div></div>
    <div class="stat-card"><div class="stat-label">Worst Sector</div><div class="stat-value stat-negative">${fp(gr(wS[0],p,c))}</div><div class="stat-detail">${wS[0].name}</div></div>`;
  renderBench('overviewBenchmarks',p,c);
  document.getElementById('overviewTopCountries').innerHTML=miniR(bC.slice(0,7),p,c,'country');
  document.getElementById('overviewTopSectors').innerHTML=miniR(bS.slice(0,7),p,c,'name');
  document.getElementById('overviewTopFactors').innerHTML=miniR([...factors].sort((a,b)=>gr(b,p,c)-gr(a,p,c)).slice(0,7),p,c,'name',true);
}

// PANEL RENDERERS
function renderCountries(){
  let p=S.period.countries,c=S.cur,data=S.regionFilter!=='all'?countries.filter(d=>d.region===S.regionFilter):countries;
  renderBench('countryBenchmarks',p,c);
  if(S.view.countries==='heatmap'){document.getElementById('countryHeatmap').style.display='';document.getElementById('countryTable').style.display='none';renderHeat('countryHeatmap',data,p,c,'country',true)}
  else{document.getElementById('countryHeatmap').style.display='none';document.getElementById('countryTable').style.display='';renderTbl('countryTable',data,p,c,'country')}
}
function renderSectors(){
  let p=S.period.sectors,c=S.cur;
  if(S.view.sectors==='heatmap'){document.getElementById('sectorHeatmap').style.display='';document.getElementById('sectorTable').style.display='none';renderHeat('sectorHeatmap',sectors,p,c,'name',false)}
  else{document.getElementById('sectorHeatmap').style.display='none';document.getElementById('sectorTable').style.display='';renderTbl('sectorTable',sectors,p,c,'name')}
}
function renderFactors(){
  let p=S.period.factors,c=S.cur;
  if(S.view.factors==='heatmap'){document.getElementById('factorHeatmap').style.display='';document.getElementById('factorTable').style.display='none';renderHeat('factorHeatmap',factors,p,c,'name',true)}
  else{document.getElementById('factorHeatmap').style.display='none';document.getElementById('factorTable').style.display='';renderTbl('factorTable',factors,p,c,'name')}
}

// TOOLTIP
const tip=document.getElementById('tooltip');
function showTip(e,d){let c=S.cur;
  tip.innerHTML=`<div class="tooltip-name">${d.country||d.name}</div><div class="tooltip-ticker">${d.ticker} · ${d.region}</div>
  <div class="tooltip-grid"><div><div class="tooltip-metric-label">1 Day</div><div class="tooltip-metric-value" style="color:${rc(gr(d,'d1',c))}">${fp(gr(d,'d1',c))}</div></div>
  <div><div class="tooltip-metric-label">1 Week</div><div class="tooltip-metric-value" style="color:${rc(gr(d,'w1',c))}">${fp(gr(d,'w1',c))}</div></div>
  <div><div class="tooltip-metric-label">YTD</div><div class="tooltip-metric-value" style="color:${rc(gr(d,'ytd',c))}">${fp(gr(d,'ytd',c))}</div></div>
  <div><div class="tooltip-metric-label">1 Year</div><div class="tooltip-metric-value" style="color:${rc(gr(d,'y1',c))}">${fp(gr(d,'y1',c))}</div></div>
  <div><div class="tooltip-metric-label">3Y Ann.</div><div class="tooltip-metric-value" style="color:${rc(gr(d,'y3',c))}">${fp(gr(d,'y3',c))}</div></div></div>`;
  tip.classList.add('show');moveTip(e)}
function moveTip(e){let x=e.clientX+16,y=e.clientY+16,r=tip.getBoundingClientRect();if(x+r.width>window.innerWidth)x=e.clientX-r.width-16;if(y+r.height>window.innerHeight)y=e.clientY-r.height-16;tip.style.left=x+'px';tip.style.top=y+'px'}
function hideTip(){tip.classList.remove('show')}

// REGION FILTERS
function renderFilters(){
  let regs=[...new Set(countries.map(d=>d.region))].sort(),el=document.getElementById('regionFilters');
  let h=`<button class="filter-pill ${S.regionFilter==='all'?'active':''}" data-region="all">All</button>`;
  regs.forEach(r=>{h+=`<button class="filter-pill ${S.regionFilter===r?'active':''}" data-region="${r}" style="${S.regionFilter===r?'border-color:'+grc(r)+';color:'+grc(r)+';background:'+grb(r):''}">${r}</button>`});
  el.innerHTML=h;el.querySelectorAll('.filter-pill').forEach(b=>b.addEventListener('click',()=>{S.regionFilter=b.dataset.region;renderFilters();renderCountries()}));
}

// EVENT WIRING
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  S.panel=t.dataset.panel;document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+S.panel).classList.add('active');renderAll()}));
document.querySelectorAll('.period-toggle').forEach(tg=>tg.querySelectorAll('.period-btn').forEach(b=>b.addEventListener('click',()=>{
  tg.querySelectorAll('.period-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.period[tg.dataset.target]=b.dataset.period;renderAll()})));
document.querySelectorAll('#currencyToggle .currency-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#currencyToggle .currency-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.cur=b.dataset.cur;renderAll()}));
['countryViewToggle','sectorViewToggle','factorViewToggle'].forEach(id=>{let el=document.getElementById(id);if(!el)return;
  let key=id==='countryViewToggle'?'countries':id==='sectorViewToggle'?'sectors':'factors';
  el.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{el.querySelectorAll('.view-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    S.view[key]=b.dataset.view;renderAll()}))});

function renderAll(){
  if(S.panel==='overview')renderOverview();if(S.panel==='countries')renderCountries();
  if(S.panel==='sectors')renderSectors();if(S.panel==='factors')renderFactors();
}
renderFilters();renderAll();
</script>
